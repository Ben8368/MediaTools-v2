<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAUTH</title>
  </head>
  <body>
    <script>
      const url = new URL(window.location.href);
      const params = new URLSearchParams(url.search);
      const payload = {};
      for (const [key, value] of params) {
        payload[key] = value;
      }

      const appWebViewMain = window.flutter_inappwebview;
      if (appWebViewMain) {
        appWebViewMain.callHandler('postLoginedMessage', JSON.stringify(payload));
      }

      window.close();
    </script>
  </body>
</html>
